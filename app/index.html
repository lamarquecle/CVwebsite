<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <title>Ingénieur IA</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <style>
    :root{
      --bg:#111;
      --fg:#eee;
      --accent:#00c2ff;
      font-family:system-ui,-apple-system,sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--fg);line-height:1.5}
    header,section{padding:4rem 8vw}
    h1{font-size:clamp(2rem,5vw,3.5rem)}
    h2{font-size:1.75rem;margin-bottom:1rem}
    .hero{display:flex;flex-direction:column;justify-content:center;min-height:80vh}
    .btn{background:var(--accent);color:#000;padding:.6rem 1.2rem;border:none;border-radius:4px;font-weight:600;cursor:pointer;margin-top:1rem}
    .btn:hover{filter:brightness(1.2)}
    .grid{display:grid;gap:1.5rem;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
    .card{background:#1a1a1a;padding:1.5rem;border-radius:8px;transition:.3s}
    .card:hover{transform:translateY(-4px)}
    footer{background:#000;text-align:center;padding:1rem;font-size:.8rem;color:#666}
  </style>
</head>
<body>

<header class="hero">
  <h1>Ingénieur IA</h1>
  <p>Accélérateur de décisions par IA</p>
  <button class="btn" onclick="scrollToSection('services')">Découvrir</button>
</header>

<section id="hardmap"></section>
  <iframe src="static/hardmap.html" style="border:none;width:100%;height:300px;"></iframe>
</section>

<section id="services_offres"></section>
  <iframe src="static/services_offres.html" style="border:none;width:100%;height:300px;"></iframe>
</section>

<section id="services"></section>
  <iframe src="static/services.html" style="border:none;width:100%;height:300px;"></iframe>
</section>

<section id="skillmap"></section>
  <iframe src="static/skillmap.html" style="border:none;width:100%;height:300px;"></iframe>
</section>

<section id="services">
  <h2>Services</h2>
  <div class="grid">
    <div class="card">Vision</div>
    <div class="card">Prévision</div>
    <div class="card">MLOps</div>
  </div>
</section>

<section id="portfolio">
  <h2>Portfolio</h2>
  <div class="grid">
    <div class="card">Défauts</div>
    <div class="card">Churn</div>
    <div class="card">NLP</div>
  </div>
</section>

<section id="about">
  <h2>À&nbsp;propos</h2>
  <p>Parcours&nbsp;: centré&nbsp;data</p>
</section>

<section id="contact">
  <h2>Contact</h2>
  <button class="btn">Email</button>
</section>

<footer>© 2025</footer>

<script>
  const scrollToSection = id => document.getElementById(id).scrollIntoView({behavior:'smooth'})
</script>
</body>
</html>
